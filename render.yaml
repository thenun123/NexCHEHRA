services:
  - type: web
    name: nexchehra
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: web:gunicorn run:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: FAL_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-large-latest
      - key: DATABASE_URL
        sync: false          # Supabase connection string (Session pooler, port 6543)
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: IMAGEKIT_ROOT_FOLDER
        value: nexchehra
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
