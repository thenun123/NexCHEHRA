<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NEXCHEHRA</title>
  <meta name="description" content="Log in to NEXCHEHRA to generate AI influencer videos for your brand.">
  <link rel="stylesheet" href="{{ static_url('css/styles.css') }}">
  <style>
    /* ===== AUTH PAGE LAYOUT ===== */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
    }

    /* ===== BACK LINK ===== */
    .auth-back {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: var(--transition-fast);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
    }

    .auth-back:hover {
      color: var(--accent-cyan);
      background: rgba(0, 212, 255, 0.06);
      border-color: var(--border-subtle);
    }

    .auth-back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* ===== AUTH CARD ===== */
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 44px 36px 40px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-primary);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }

    /* ===== BRAND HEADER ===== */
    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.2));
    }

    .auth-brand-name {
      font-size: 1.1rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .auth-brand-tagline {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ===== FORM ===== */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-field {
      position: relative;
    }

    .auth-field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .auth-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.92rem;
      font-family: inherit;
      transition: var(--transition-fast);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }

    .auth-input::placeholder {
      color: var(--text-muted);
    }

    /* ===== BUTTON ===== */
    .auth-submit {
      width: 100%;
      padding: 16px;
      background: var(--gradient-button);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition-normal);
      margin-top: 6px;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 212, 255, 0.35);
    }

    .auth-submit:active {
      transform: translateY(0);
    }

    /* ===== ERROR ===== */
    .auth-error {
      background: rgba(255, 68, 102, 0.08);
      border: 1px solid rgba(255, 68, 102, 0.2);
      color: var(--accent-red);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* ===== DIVIDER ===== */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 8px 0;
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    /* ===== FOOTER LINKS ===== */
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .auth-footer a:hover {
      color: #fff;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .auth-card {
        padding: 36px 24px 32px;
        border-radius: var(--radius-lg);
      }

      .auth-back {
        top: 16px;
        left: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-overlay"></div>

  <a href="/" class="auth-back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
  </a>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <a href="/"><img src="{{ static_url('assets/logo.png') }}" alt="Nexchehra" class="auth-logo"></a>
        <div class="auth-brand-name">NEXCHEHRA</div>
        <div class="auth-brand-tagline">Give your brand a new face</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to continue to your dashboard</p>
      </div>

      {% if error %}
      <div class="auth-error">⚠️ {{ error }}</div>
      {% endif %}

      <!-- Login Form -->
      <form class="auth-form" method="POST" action="/login" id="loginForm">
        <div class="auth-field">
          <label class="auth-field-label" for="auth-login-id">Email or Username</label>
          <input type="text" name="login_id" id="auth-login-id" class="auth-input" placeholder="Enter your email or username" required autofocus>
        </div>

        <div class="auth-field">
          <label class="auth-field-label" for="auth-password">Password</label>
          <input type="password" name="password" id="auth-password" class="auth-input" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="auth-submit" id="loginSubmitBtn">Log In →</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one now</a>
      </div>

    </div>
  </div>
</body>
</html>
